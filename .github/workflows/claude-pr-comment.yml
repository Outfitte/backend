name: Claude PR Comment Handler

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  claude-fix-from-review:
    if: |
      github.event_name == 'pull_request_review' &&
      contains(github.event.review.body, '@claude fix')
    runs-on: claude-runner
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun v2
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run Claude PR Comment Fix
        uses: anthropics/claude-code-action@v1
        with:
          path_to_bun_executable: ~/.bun/bin/bun
          path_to_claude_code_executable: /home/maxime/.local/bin/claude
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--add-dir /home/maxime/actions-runner/_work/Outfitte/Outfitte"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(go *)",
                  "Bash(git *)",
                  "Bash(gh *)",
                  "Bash(make *)",
                  "Read(*)",
                  "Write(*)",
                  "Edit(*)"
                ],
                "deny": [
                  "Bash(git *--force*)",
                  "Bash(git * -f)",
                  "Bash(git * -f *)"
                ]
              }
            }
          prompt: |
            Use the /pr-comment-fix skill.

            Trigger: review_submitted
            PR number: ${{ github.event.pull_request.number }}
            Review ID: ${{ github.event.review.id }}
            Review body: ${{ github.event.review.body }}

  claude-fix-from-pr-comment:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude fix')
    runs-on: claude-runner
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun v2
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run Claude PR Comment Fix
        uses: anthropics/claude-code-action@v1
        with:
          path_to_bun_executable: ~/.bun/bin/bun
          path_to_claude_code_executable: /home/maxime/.local/bin/claude
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--add-dir /home/maxime/actions-runner/_work/Outfitte/Outfitte"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(go *)",
                  "Bash(git *)",
                  "Bash(gh *)",
                  "Bash(make *)",
                  "Read(*)",
                  "Write(*)",
                  "Edit(*)"
                ],
                "deny": [
                  "Bash(git *--force*)",
                  "Bash(git * -f)",
                  "Bash(git * -f *)"
                ]
              }
            }
          prompt: |
            Use the /pr-comment-fix skill.

            Trigger: pr_comment
            PR number: ${{ github.event.issue.number }}
            Comment ID: ${{ github.event.comment.id }}
            Comment body: ${{ github.event.comment.body }}
