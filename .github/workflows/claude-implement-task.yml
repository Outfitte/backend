name: Claude Implement Task

on:
  issue_comment:
    types: [created]

jobs:
  claude-implement:
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@claude')
    runs-on: claude-runner
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Implement Task
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Use the /implement-task skill for issue #${{ github.event.issue.number }}.
