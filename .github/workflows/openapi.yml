name: OpenAPI Lint

on:
  push:
    paths:
      - docs/openapi.yaml
      - .spectral.yaml
  pull_request:
    paths:
      - docs/openapi.yaml
      - .spectral.yaml
  workflow_dispatch:

jobs:
  spectral:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: stoplightio/spectral-action@v0.8.13
        with:
          file_glob: docs/openapi.yaml

      - name: Build API reference
        run: npx -y @redocly/cli@^1 build-docs docs/openapi.yaml -o docs/api.html

      - name: Upload API reference
        uses: actions/upload-artifact@v7
        with:
          name: api-reference
          path: docs/api.html
          retention-days: 30
