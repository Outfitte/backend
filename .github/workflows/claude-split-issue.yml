name: Claude Split Issue

on:
  issue_comment:
    types: [created]

jobs:
  claude-split:
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@claude split issue')
    runs-on: claude-runner
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Bun v2
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run Claude Split Issue
        uses: anthropics/claude-code-action@v1
        with:
          path_to_bun_executable: ~/.bun/bin/bun
          path_to_claude_code_executable: /home/maxime/.local/bin/claude
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--add-dir /home/maxime/actions-runner/_work/Outfitte/Outfitte"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(go *)",
                  "Bash(git *)",
                  "Bash(gh *)",
                  "Bash(make *)",
                  "Read(*)",
                  "Write(*)",
                  "Edit(*)"
                ],
                "deny": [
                  "Bash(git *--force*)",
                  "Bash(git * -f)",
                  "Bash(git * -f *)"
                ]
              }
            }
          prompt: |
            Use the /split-issue skill for issue #${{ github.event.issue.number }}.
