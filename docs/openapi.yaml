tags:
  - name: health
    description: Service health
  - name: auth
    description: Authentication and session management
  - name: admin
    description: Administrator-only operations (JWT + admin role required)
  - name: categories
    description: Item categories
  - name: items
    description: Wardrobe items
  - name: wear-logs
    description: Item wear events
  - name: locations
    description: Storage locations
  - name: outfits
    description: Outfit collections
  - name: outfit-logs
    description: Outfit wear events
  - name: media
    description: Media file download
  - name: users
    description: User listing (for share recipient selection)
  - name: shares
    description: Granular sharing of items, outfits, and locations
