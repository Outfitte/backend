        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipient_id, target_type, target_id]
              properties:
                recipient_id:
                  type: string
                  format: uuid
                target_type:
                  type: string
