services:
  app:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    env_file:
      - .env
    volumes:
      - sqlite_data:/data
      - media_storage:${MEDIA_STORAGE_PATH:-/data/media}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${SERVER_PORT:-8080}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # db:
  #   image: postgres:17
  #   Uncomment when DB_DRIVER=postgres is used.

volumes:
  sqlite_data:
  media_storage:
