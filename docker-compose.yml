services:
  app:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${SERVER_PORT:-8080}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # db:
